apiVersion: apps/v1
kind: Deployment
metadata:
  name: fundamentos-devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fundamentos-devops
  template:
    metadata:
      labels:
        app: fundamentos-devops
    spec:
      containers:
      - name: fundamentos-devops
        image: fundamentos-devops:1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
